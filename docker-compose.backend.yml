version: '3.8'

services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PORT=4005
      - MONGODB_URI=mongodb://mongodb:27017/klb-whatsapp
      - REDIS_URL=redis://redis:6379
      - CONVEX_URL=${CONVEX_URL}
      - CONVEX_DEPLOYMENT=${CONVEX_DEPLOYMENT}
      - CONVEX_SITE_URL=${CONVEX_SITE_URL}
      - DASHBOARD_URL=${DASHBOARD_URL}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    ports:
      - "4005:4005"
    depends_on:
      - mongodb
      - redis

volumes:
  mongodb_data:
